
```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhode Beauty</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f6c1d6;
    color: #222;
}

header {
    text-align: center;
    padding: 25px;
    font-size: 2.5rem;
    font-weight: bold;
    letter-spacing: 3px;
    background: #f2a7c6;
}

.hero {
    display: flex;
    justify-content: center;
    padding: 30px;
}

.hero img {
    width: 95%;
    max-width: 1000px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
}

.section {
    padding: 40px 20px;
    text-align: center;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 220px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.product:hover {
    transform: translateY(-5px);
}

.product img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #f2a7c6;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #e08fb0;
}

footer {
    text-align: center;
    padding: 20px;
    background: #f2a7c6;
    margin-top: 40px;
}

@media (max-width: 700px) {
    .products {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<header>RHODE</header>

<!-- HERO IMAGE -->
<div class="hero">
    <img src="images/hero.jpg" alt="Rhode Banner">
</div>

<!-- GALLERY -->
<div class="gallery">
    <img src="images/lip-tints.jpg" alt="Lip tints">
    <img src="images/blush.jpg" alt="Blush product">
    <img src="images/lip-close.jpg" alt="Lip tint close up">
</div>

<!-- PRODUCTS -->
<div class="section">
    <h2>Featured Products</h2>

    <div class="products">

        <div class="product">
            <img src="images/lip-tints.jpg" alt="">
            <h3>Peptide Lip Tint</h3>
            <p>Glossy hydration + color</p>
            <button>Shop Now</button>
        </div>

        <div class="product">
            <img src="images/blush.jpg" alt="">
            <h3>Pocket Blush</h3>
            <p>Buildable cream blush</p>
            <button>Shop Now</button>
        </div>

        <div class="product">
            <img src="images/lip-close.jpg" alt="">
            <h3>Glazing Milk</h3>
            <p>Barrier boosting essence</p>
            <button>Shop Now</button>
        </div>

        <div class="product">
            <img src="images/lip-tints.jpg" alt="">
            <h3>Eye Prep</h3>
            <p>Depuff + smooth</p>
            <button>Shop Now</button>
        </div>

    </div>
</div>

<footer>
    © 2026 Rhode Inspired
</footer>

</body>
</html>
