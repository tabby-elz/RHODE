<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhode Inspired</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f7c6d9;
        color: #333;
    }

    header {
        text-align: center;
        padding: 20px;
        background-color: #f4a8c4;
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 2px;
    }

    .hero {
        text-align: center;
        padding: 20px;
    }

    .hero img {
        width: 90%;
        max-width: 900px;
        border-radius: 12px;
    }

    .section {
        padding: 40px 20px;
        text-align: center;
    }

    .products {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
    }

    .product {
        background: white;
        padding: 15px;
        border-radius: 10px;
        width: 200px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .product img {
        width: 100%;
        border-radius: 8px;
    }

    .product h3 {
        margin: 10px 0 5px;
    }

    .product p {
        font-size: 0.9rem;
    }

    footer {
        text-align: center;
        padding: 20px;
        background: #f4a8c4;
        margin-top: 40px;
    }

    @media (max-width: 600px) {
        .products {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
</head>

<body>

<header>RHODE</header>

<div class="hero">
    <img src="RHODE.png" alt="Rhode Collage">
</div>

<div class="section">
    <h2>Our Products</h2>
    <div class="products">
        
        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Lip Tint</h3>
            <p>Hydrating glossy colors</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Blush</h3>
            <p>Buildable cream blush</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Glazing Milk</h3>
            <p>Ceramide facial essence</p>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h3>Eye Prep</h3>
            <p>Depuffing eye patches</p>
        </div>

    </div>
</div>

<footer>
    © 2026 Rhode Inspired Site
</footer>

</body>
</html>
