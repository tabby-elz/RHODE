<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rhode | Peptide Skincare + Lip Essentials</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* BABY PINK BACKGROUND - soft & clear */
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd5e2 50%, #ffe0ea 100%);
            font-family: 'Inter', sans-serif;
            color: #2c1a0c;
            padding: 2rem 1.5rem;
        }

        /* main glass container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 248, 245, 0.88);
            backdrop-filter: blur(2px);
            border-radius: 3rem 2rem 4rem 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 180, 180, 0.5);
            overflow: hidden;
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s;
        }

        /* brand header with gradient */
        .brand-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .brand-header h1 {
            font-size: 5.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(125deg, #D45F2E, #BF3F22, #EE9B54, #C1542C);
            background-size: 220% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: waveGradient 6s ease infinite;
        }

        @keyframes waveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .brand-sub {
            font-size: 1rem;
            background: #fff2f0;
            display: inline-block;
            padding: 0.35rem 1.8rem;
            border-radius: 60px;
            font-weight: 500;
            color: #bd5733;
            margin-top: 0.5rem;
            border: 1px solid #ffc0cb;
            backdrop-filter: blur(2px);
        }

        /* HERO IMAGE - BIG, CLEAR, WITH NEW BRANDING PHOTO */
        .hero-image {
            width: 100%;
            max-height: 480px;
            overflow: hidden;
            border-radius: 2rem;
            margin: 1rem 0 2rem 0;
            box-shadow: 0 16px 32px -12px rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 200, 180, 0.8);
            background: #fff5f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image img {
            width: 100%;
            height: auto;
            max-height: 480px;
            object-fit: contain;
            object-position: center;
            transition: transform 0.3s ease;
            display: block;
            background: #fff5f0;
            image-rendering: crisp-edges;
            image-rendering: high-quality;
        }

        .hero-image:hover img {
            transform: scale(1.01);
        }

        /* product grid - ALL 4 PRODUCTS */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0 2rem;
        }

        /* card styling */
        .product-card {
            background: #fffffffa;
            border-radius: 2rem;
            padding: 1.2rem 1.2rem 1.8rem;
            transition: transform 0.25s ease, box-shadow 0.3s;
            box-shadow: 0 12px 22px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #fdd0da;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 34px -14px rgba(201, 90, 63, 0.2);
            border-color: #ffb0c0;
            background: #ffffff;
        }

        .product-image {
            width: 100%;
            height: 180px;
            background: #fbe8e8;
            border-radius: 1.5rem;
            margin-bottom: 1rem;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 5px 12px -6px rgba(0,0,0,0.1);
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.25s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.02);
        }

        .image-duo {
            display: flex;
            gap: 8px;
            width: 100%;
            height: 100%;
        }
        .image-duo .img-half {
            flex: 1;
            overflow: hidden;
            border-radius: 1rem;
            background: #fbe3e0;
        }
        .image-duo .img-half img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-icon {
            font-size: 1.7rem;
            margin-right: 0.3rem;
            display: inline-block;
        }

        .product-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d1809;
            margin: 0.3rem 0 0.2rem;
        }

        .product-desc {
            font-size: 0.75rem;
            font-weight: 600;
            color: #b55a34;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 0.5rem;
        }

        .product-highlight {
            font-size: 0.75rem;
            background: #fef0ea;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: inline-block;
            width: fit-content;
            font-weight: 500;
            color: #b9512a;
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(125deg, #c95a3f, #e67748);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0.6rem 0 0.2rem;
        }

        .buy-btn {
            margin-top: 1rem;
            background: #fbe4e0;
            border: 1px solid #ffcfc0;
            border-radius: 40px;
            padding: 0.7rem 0;
            font-weight: 700;
            font-size: 0.85rem;
            color: #bc4e2c;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .buy-btn:hover {
            background: #ffd6cc;
            color: #942e0c;
            border-color: #eaa06a;
            transform: scale(0.97);
        }

        /* spotlight banner */
        .rhode-spotlight {
            margin: 2rem 0 1.2rem;
            background: radial-gradient(ellipse at 20% 30%, #fff0ec, #ffe4e0);
            padding: 1.4rem 2rem;
            border-radius: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .spotlight-text h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #bb4827;
        }

        .badge-stats {
            background: #fff2ee;
            padding: 0.3rem 1.2rem;
            border-radius: 50px;
            font-weight: 800;
            color: #c15d39;
            font-size: 1.2rem;
        }

        hr {
            margin: 1.8rem 0 1rem;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, #ffcdbb, #ffab88, #ffcdbb);
        }

        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: #b97a56;
            font-weight: 500;
            margin-top: 1.8rem;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            justify-content: center;
            margin: 1rem 0 0.5rem;
        }

        .tag-row span {
            background: #ffede8;
            padding: 0.25rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b5522e;
        }

        @media (max-width: 720px) {
            body { padding: 1rem; }
            .container { padding: 1.2rem; }
            .brand-header h1 { font-size: 3.2rem; }
            .hero-image { max-height: 220px; }
            .hero-image img { max-height: 220px; }
        }
    </style>
</head>
