
     
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhode Beauty</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f6c1d6;
        color: #222;
    }

    header {
        text-align: center;
        padding: 25px;
        font-size: 2.5rem;
        font-weight: bold;
        letter-spacing: 3px;
        background: #f2a7c6;
    }

    /* HERO */
    .hero {
        display: flex;
        justify-content: center;
        padding: 30px;
    }

    .hero img {
        width: 95%;
        max-width: 1000px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* GALLERY */
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 30px;
    }

    .gallery img {
        width: 100%;
        border-radius: 12px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    /* PRODUCTS */
    .section {
        padding: 40px 20px;
        text-align: center;
    }

    .products {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
    }

    .product {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 220px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    footer {
        text-align: center;
        padding: 20px;
        background: #f2a7c6;
        margin-top: 40px;
    }

    @media (max-width: 700px) {
        .products {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
</head>

<body>

<header>RHODE</header>

<!-- HERO IMAGE -->
<div class="hero">
    <img src="collage.png" alt="Rhode collage">
</div>

<!-- IMAGE GALLERY -->
<div class="gallery">
    <img src="products1.png" alt="Rhode products flatlay">
    <img src="products2.png" alt="Rhode model and products">
</div>

<!-- PRODUCTS SECTION -->
<div class="section">
    <h2>Featured Products</h2>

    <div class="products">
        <div class="product">
            <h3>Peptide Lip Tint</h3>
            <p>Glossy hydration + color</p>
        </div>

        <div class="product">
            <h3>Pocket Blush</h3>
            <p>Buildable cream blush</p>
        </div>

        <div class="product">
            <h3>Glazing Milk</h3>
            <p>Barrier boosting essence</p>
        </div>

        <div class="product">
            <h3>Eye Prep</h3>
            <p>Depuff + smooth</p>
        </div>
    </div>
</div>

<footer>
    © 2026 Rhode Inspired
</footer>

</body>
</html>
